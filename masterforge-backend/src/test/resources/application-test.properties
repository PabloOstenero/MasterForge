# ===============================
# H2 IN-MEMORY DATABASE FOR TESTS
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS TEXT
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Use 'jackson' instead of the ObjectMapper class name to avoid ClassCastException
spring.jpa.properties.hibernate.type.json_format_mapper=jackson

# ===============================
# JWT CONFIGURATION
# ===============================
mf.jwt.secret=masterforge-default-secret-key-change-in-production-min32chars
