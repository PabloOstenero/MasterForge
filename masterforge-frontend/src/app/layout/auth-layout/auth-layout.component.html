<div class="layout-wrapper">
  <nav class="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-title">MasterForge</span>
    </div>

    <ul class="nav-list">
      @for (item of menuItems$ | async; track item.route) {
        <li>
          <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
            <ion-icon [name]="item.icon"></ion-icon>
            <span>{{ item.title }}</span>
          </a>
        </li>
      }
    </ul>

    <div class="sidebar-bottom">
      <button class="logout-btn" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </nav>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-actions">
        <ion-button (click)="toggleRole()" fill="clear" color="warning" class="role-toggle-btn">
          <ion-icon slot="start" name="swap-horizontal-outline"></ion-icon>
          <span class="ion-hide-sm-down">{{ (activeRole$ | async) === 'dm' ? 'Modo Jugador' : 'Modo Director' }}</span>
        </ion-button>
        <ion-avatar class="ion-margin-start" style="width: 32px; height: 32px;">
          <img src="https://ionicframework.com/docs/img/demos/avatar.svg" alt="avatar" />
        </ion-avatar>
      </div>
    </div>
    <router-outlet></router-outlet>
  </main>
</div>
