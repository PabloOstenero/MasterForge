<div class="layout-wrapper">
  <nav class="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-title">MasterForge</span>
    </div>

    <ul class="nav-list">
      @for (item of menuItems$ | async; track item.route) {
        <li>
          <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
            <ion-icon [name]="item.icon"></ion-icon>
            <span>{{ item.title }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">
        <span>Dashboard de {{ username }}</span>
      </div>
      <div class="topbar-actions">
        <ion-button (click)="toggleRole()" fill="clear" color="warning" class="role-toggle-btn">
          <ion-icon slot="start" name="swap-horizontal-outline"></ion-icon>
          <span class="ion-hide-sm-down">{{ (activeRole$ | async) === 'dm' ? 'Modo Jugador' : 'Modo Director' }}</span>
        </ion-button>
        <button class="avatar-btn" (click)="openDropdown()" aria-label="Menú de usuario" type="button">
          <img src="https://ionicframework.com/docs/img/demos/avatar.svg" alt="avatar" />
        </button>
      </div>
      @if (isDropdownOpen) {
        <div class="dropdown-overlay" (click)="closeDropdown()"></div>
        <div class="dropdown-menu">
          <button class="dropdown-item" type="button" (click)="navigateToSettings()">
            <ion-icon name="settings-outline"></ion-icon>
            <span>Configuración</span>
          </button>
          <button class="dropdown-item danger" type="button" (click)="logout()">
            <ion-icon name="log-out-outline"></ion-icon>
            <span>Cerrar Sesión</span>
          </button>
        </div>
      }
    </div>
    <router-outlet></router-outlet>
  </main>
</div>
