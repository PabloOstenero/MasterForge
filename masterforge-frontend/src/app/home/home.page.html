<ion-content [fullscreen]="true" class="ion-padding">
  
  <ion-card>
    <ion-card-header>
      <ion-card-title>Reclutar Aventurero</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-input 
        label="Nombre del Jugador" 
        labelPlacement="floating" 
        [(ngModel)]="newUser.name">
      </ion-input>

      <ion-input 
        label="Correo Electrónico" 
        labelPlacement="floating" 
        type="email" 
        [(ngModel)]="newUser.email">
      </ion-input>

      <ion-button expand="block" class="ion-margin-top" (click)="registerUsers()">
        Añadir a la Taberna
      </ion-button>
    </ion-card-content>
  </ion-card>

  <h2 class="ion-margin-top">Usuarios Registrados</h2>
  <ion-list>
    @for (user of users; track user.id) {
      <ion-item>
        <ion-avatar slot="start">
          <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
        </ion-avatar>
        <ion-label>
          <h2>{{ user.name }}</h2>
          <p>{{ user.email }}</p>
        </ion-label>
        <ion-badge color="warning" slot="end">{{ user.subscriptionTier }}</ion-badge>
      </ion-item>
    } @empty {
      <p>La taberna está vacía...</p>
    }
  </ion-list>

</ion-content>
