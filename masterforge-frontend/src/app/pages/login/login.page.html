<ion-content class="login-content">
  <div class="login-wrapper">
    <ion-card class="login-card">
      <ion-card-header>
        <ion-card-title class="login-title">MasterForge</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <div class="form-group">
          <ion-input
            label="Correo electrónico"
            labelPlacement="floating"
            type="email"
            [(ngModel)]="email"
            [disabled]="isLoading"
            autocomplete="email"
            data-testid="email-input">
          </ion-input>
        </div>

        <div class="form-group">
          <ion-input
            label="Contraseña"
            labelPlacement="floating"
            type="password"
            [(ngModel)]="password"
            [disabled]="isLoading"
            autocomplete="current-password"
            data-testid="password-input">
          </ion-input>
        </div>

        @if (errorMessage) {
          <p class="error-msg" data-testid="error-message">{{ errorMessage }}</p>
        }

        <ion-button
          expand="block"
          class="login-btn ion-margin-top"
          [disabled]="isLoading"
          (click)="onSubmit()"
          data-testid="submit-button">
          {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
        </ion-button>

        <p class="nav-link">¿No tienes cuenta? <span (click)="router.navigate(['/register'])">Regístrate</span></p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
